name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    env:
      # apt /usr/bin/rosdep uses pkg_resources; harmless but noisy (rosdep#1011)
      PYTHONWARNINGS: ignore::DeprecationWarning
    steps:
      - uses: actions/checkout@v4

      - name: Setup ROS Jazzy
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Install workspace dependencies
        run: |
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y
          pip install -r requirements.txt

      - name: Run frame unit tests
        working-directory: src/ur5e_pick_and_place
        run: |
          PYTHONPATH=. pytest test/test_frames.py -q

      - name: Build workspace
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --symlink-install \
            --packages-select ur5e_description ur5e_moveit_config robotiq_description \
            ur5e_bringup ur5e_pick_and_place
          source install/setup.bash
          colcon test --packages-select ur5e_pick_and_place --event-handlers console_cohesion+
          colcon test-result --verbose

      - name: Validate robot and MoveIt configuration
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          ros2 run ur5e_pick_and_place validate_config

      - name: Validate launch files
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          bash src/ur5e_pick_and_place/scripts/validate_launches.sh

      - name: Mock MoveIt smoke test
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          bash src/ur5e_pick_and_place/scripts/smoke_test_sim.sh mock
