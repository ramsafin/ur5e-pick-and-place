name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install pytest

      - name: Run frame unit tests
        working-directory: ur5e_ws/src/ur5e_gazebo_demo
        run: |
          PYTHONPATH=. pytest test/test_frames.py -q

      - name: Setup ROS Jazzy
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Install workspace dependencies
        working-directory: ur5e_ws
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ros-jazzy-ur-description \
            ros-jazzy-xacro \
            ros-jazzy-urdfdom \
            liburdfdom-tools \
            python3-yaml
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y

      - name: Build workspace
        working-directory: ur5e_ws
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --symlink-install --packages-select ur5e_gazebo_demo ur5e_moveit_config robotiq_description
          source install/setup.bash
          colcon test --packages-select ur5e_gazebo_demo --event-handlers console_cohesion+
          colcon test-result --verbose

      - name: Validate robot and MoveIt configuration
        working-directory: ur5e_ws
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          ros2 run ur5e_gazebo_demo validate_config

      - name: Validate launch files
        working-directory: ur5e_ws
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          bash src/ur5e_gazebo_demo/scripts/validate_launches.sh
